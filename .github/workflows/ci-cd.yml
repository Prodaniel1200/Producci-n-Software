name: Pipeline CONIITI

on:
  push:
    branches: [main, desarrollo-rediseño]
  pull_request:
    branches: [main, desarrollo-rediseño]

jobs:
  calidad-y-build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clonar el codigo
        uses: actions/checkout@v4

      - name: 2. Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 3. Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: 4. Verificar calidad del codigo con Ruff
        run: ruff check .

      - name: 5. Verificar formato del codigo
        run: ruff format --check .

      - name: 6. Ejecutar pruebas unitarias
        run: pytest -v --maxfail=1 --disable-warnings

      - name: 7. Verificar que la app inicia correctamente
        run: |
          python -c "import main.app as app; print('Build OK')"
