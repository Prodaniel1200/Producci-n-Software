name: Deploy auth-service

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login ACR
        run: az acr login --name PracticaProduccion

      - name: Build image
        run: docker build -t practicaproduccion.azurecr.io/auth-service:v1 .

      - name: Push image
        run: docker push practicaproduccion.azurecr.io/auth-service:v1