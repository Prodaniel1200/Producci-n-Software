name: Deploy All Microservices

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. CODE
      # =========================
      - name: Checkout
        uses: actions/checkout@v3

      # =========================
      # 2. AZURE LOGIN
      # =========================
      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # =========================
      # 3. ACR LOGIN
      # =========================
      - name: Login ACR
        run: az acr login --name PracticaProduccion

      # =========================
      # 4. AUTH SERVICE
      # =========================
      - name: Build auth
        run: docker build -t practicaproduccion.azurecr.io/auth-service:v1 ./Docker-Microservices/services/auth_service

      - name: Push auth
        run: docker push practicaproduccion.azurecr.io/auth-service:v1

      # =========================
      # 5. AGENDA SERVICE
      # =========================
      - name: Build agenda
        run: docker build -t practicaproduccion.azurecr.io/agenda-service:v1 ./Docker-Microservices/services/agenda_service

      - name: Push agenda
        run: docker push practicaproduccion.azurecr.io/agenda-service:v1

      # =========================
      # 6. CONTACT SERVICE
      # =========================
      - name: Build contact
        run: docker build -t practicaproduccion.azurecr.io/contact-service:v1 ./Docker-Microservices/services/contact_service

      - name: Push contact
        run: docker push practicaproduccion.azurecr.io/contact-service:v1

      # =========================
      # 7. INTEGRATIONS SERVICE
      # =========================
      - name: Build integrations
        run: docker build -t practicaproduccion.azurecr.io/integrations-service:v1 ./Docker-Microservices/services/integrations_service

      - name: Push integrations
        run: docker push practicaproduccion.azurecr.io/integrations-service:v1

      # =========================
      # 8. NOTIFICATIONS SERVICE
      # =========================
      - name: Build notifications
        run: docker build -t practicaproduccion.azurecr.io/notifications-service:v1 ./Docker-Microservices/services/notifications_service

      - name: Push notifications
        run: docker push practicaproduccion.azurecr.io/notifications-service:v1

      # =========================
      # 9. WEB SERVICE
      # =========================
      - name: Build web
        run: docker build -t practicaproduccion.azurecr.io/web-service:v1 ./Docker-Microservices/services/web_service

      - name: Push web
        run: docker push practicaproduccion.azurecr.io/web-service:v1