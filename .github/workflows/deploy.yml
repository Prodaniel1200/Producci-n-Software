name: Deploy All Microservices

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar código
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Configurar Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # =========================
      # AUTH SERVICE
      # =========================
      - name: Instalar dependencias auth
        run: pip install -r auth/requirements.txt

      - name: Test auth
        run: pytest auth

      # =========================
      # AGENDA SERVICE
      # =========================
      - name: Instalar dependencias agenda
        run: pip install -r agenda/requirements.txt

      - name: Test agenda
        run: pytest agenda

      # =========================
      # CONTACT SERVICE
      # =========================
      - name: Instalar dependencias contact
        run: pip install -r contact/requirements.txt

      - name: Test contact
        run: pytest contact

      # =========================
      # LOGIN AZURE
      # =========================
      - name: Login Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login ACR
        run: az acr login --name PracticaProduccion

      # =========================
      # BUILD Y PUSH AUTH
      # =========================
      - name: Build auth
        run: docker build -t practicaproduccion.azurecr.io/auth-service:v1 ./auth

      - name: Push auth
        run: docker push practicaproduccion.azurecr.io/auth-service:v1

      # =========================
      # BUILD Y PUSH AGENDA
      # =========================
      - name: Build agenda
        run: docker build -t practicaproduccion.azurecr.io/agenda-service:v1 ./agenda

      - name: Push agenda
        run: docker push practicaproduccion.azurecr.io/agenda-service:v1

      # =========================
      # BUILD Y PUSH CONTACT
      # =========================
      - name: Build contact
        run: docker build -t practicaproduccion.azurecr.io/contact-service:v1 ./contact

      - name: Push contact
        run: docker push practicaproduccion.azurecr.io/contact-service:v1