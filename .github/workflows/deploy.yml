name: Deploy All Microservices

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3. Instalar pytest
      - name: Install pytest
        run: pip install pytest

      # =========================
      # AUTH SERVICE
      # =========================
      - name: Instalar dependencias auth
        run: pip install -r Docker-Microservices/services/auth_service/requirements.txt

      - name: Test auth
        run: pytest Docker-Microservices/services/auth_service || true

      # =========================
      # AGENDA SERVICE
      # =========================
      - name: Instalar dependencias agenda
        run: pip install -r Docker-Microservices/services/agenda_service/requirements.txt

      - name: Test agenda
        run: pytest Docker-Microservices/services/agenda_service || true

      # =========================
      # CONTACT SERVICE
      # =========================
      - name: Instalar dependencias contact
        run: pip install -r Docker-Microservices/services/contact_service/requirements.txt

      - name: Test contact
        run: pytest Docker-Microservices/services/contact_service || true

      # =========================
      # LOGIN AZURE
      # =========================
      - name: Login Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # =========================
      # LOGIN ACR (CORRECTO)
      # =========================
      - name: Login ACR
        run: |
          az acr login --name PracticaProduccion
          docker login practicaproduccion.azurecr.io \
            -u ${{ secrets.ACR_USERNAME }} \
            -p ${{ secrets.ACR_PASSWORD }}

      # =========================
      # BUILD Y PUSH AUTH
      # =========================
      - name: Build auth
        run: docker build -t practicaproduccion.azurecr.io/auth-service:v1 Docker-Microservices/services/auth_service

      - name: Push auth
        run: docker push practicaproduccion.azurecr.io/auth-service:v1

      # =========================
      # BUILD Y PUSH AGENDA
      # =========================
      - name: Build agenda
        run: docker build -t practicaproduccion.azurecr.io/agenda-service:v1 Docker-Microservices/services/agenda_service

      - name: Push agenda
        run: docker push practicaproduccion.azurecr.io/agenda-service:v1

      # =========================
      # BUILD Y PUSH CONTACT
      # =========================
      - name: Build contact
        run: docker build -t practicaproduccion.azurecr.io/contact-service:v1 Docker-Microservices/services/contact_service

      - name: Push contact
        run: docker push practicaproduccion.azurecr.io/contact-service:v1