apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-service
  namespace: web-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-service
  template:
    metadata:
      labels:
        app: web-service
    spec:
      containers:
        - name: web-service
          image: docker-microservices/web-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: SECRET_KEY
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: AUTH_SERVICE_URL
            - name: AGENDA_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: AGENDA_SERVICE_URL
            - name: CONTACT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: CONTACT_SERVICE_URL
            - name: INTEGRATIONS_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: INTEGRATIONS_SERVICE_URL
            - name: REQUEST_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: REQUEST_TIMEOUT
            - name: GUNICORN_WORKERS
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: GUNICORN_WORKERS
            - name: GUNICORN_THREADS
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: GUNICORN_THREADS
            - name: GUNICORN_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: GUNICORN_TIMEOUT
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: web-platform
spec:
  selector:
    app: web-service
  ports:
    - name: http
      port: 5000
      targetPort: 5000
