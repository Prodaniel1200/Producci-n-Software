upstream web_service_upstream {
    server web-service:5000;
    keepalive 32;
}

upstream auth_service_upstream {
    server auth-service:5000;
    keepalive 16;
}

upstream agenda_service_upstream {
    server agenda-service:5000;
    keepalive 16;
}

upstream contact_service_upstream {
    server contact-service:5000;
    keepalive 16;
}

upstream integrations_service_upstream {
    server integrations-service:5000;
    keepalive 16;
}

upstream notifications_service_upstream {
    server notifications-service:5000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Connection "";

    location = /gateway-health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"gateway"}';
    }

    location /api/auth/ {
        proxy_pass http://auth_service_upstream;
    }

    location = /api/agenda {
        proxy_pass http://agenda_service_upstream;
    }

    location /api/agenda/ {
        proxy_pass http://agenda_service_upstream;
    }

    location = /api/ponentes {
        proxy_pass http://agenda_service_upstream;
    }

    location /api/ponentes/ {
        proxy_pass http://agenda_service_upstream;
    }

    location = /api/contact {
        proxy_pass http://contact_service_upstream;
    }

    location /api/contact/ {
        proxy_pass http://contact_service_upstream;
    }

    location /api/integrations/ {
        proxy_pass http://integrations_service_upstream;
    }

    location /api/notifications/ {
        proxy_pass http://notifications_service_upstream;
    }

    location / {
        proxy_pass http://web_service_upstream;
    }
}
