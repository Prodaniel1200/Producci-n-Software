<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <title>{% block title %}CONIITI 2026{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}?v=20">
</head>

<body class="{% block body_class %}{% endblock %}">

    <!-- OVERLAY OSCURO -->
    <div class="background-overlay"></div>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg custom-navbar fixed-top">

        <div class="container">

            <!-- LOGOS -->
            <a class="navbar-brand d-flex align-items-center"
               href="{{ url_for('public.inicio') }}">

                <img src="{{ url_for('static', filename='logos/ucat.png') }}"
                     alt="Universidad Católica"
                     class="navbar-logo">

                <img src="{{ url_for('static', filename='logos/coniiti.png') }}"
                     alt="Coniiti"
                     class="navbar-title">

            </a>

            <!-- BOTON RESPONSIVE -->
            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <!-- MENU -->
            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link"
                           href="{{ url_for('public.inicio') }}">
                            INICIO
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                           href="{{ url_for('agenda.view_agenda') }}">
                            AGENDA
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                           href="{{ url_for('public.acerca') }}">
                            ACERCA DE
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                           href="{{ url_for('public.contacto') }}">
                            CONTACTO
                        </a>
                    </li>

                </ul>

                {% if current_user.is_authenticated %}

                    <span class="navbar-text ms-3 fw-bold text-white">
                        {{ current_user.id }}
                    </span>

                    <a href="{{ url_for('auth.logout') }}"
                       class="btn btn-outline-light ms-2">

                        Cerrar sesión

                    </a>

                {% else %}

                    <a href="{{ url_for('auth.login') }}"
                       class="btn btn-outline-light ms-2">

                        Iniciar sesión

                    </a>

                {% endif %}

            </div>

        </div>

    </nav>

    <!-- CONTENIDO -->
    <main class="contenido-principal">

        {% block content %}{% endblock %}

    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
