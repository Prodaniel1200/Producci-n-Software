<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <title>{% block title %}CONIITI 2026{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}?v=20">
</head>

<body class="{% block body_class %}{% endblock %}">

    <div class="background-overlay"></div>

    <nav class="navbar navbar-expand-lg custom-navbar fixed-top">

        <div class="container">

            <!-- LOGO -->
            <a class="navbar-brand"
               href="{{ url_for('public.inicio') }}">

                <img src="{{ url_for('static', filename='logos/ucat.png') }}"
                     class="navbar-logo">

                <img src="{{ url_for('static', filename='logos/coniiti.png') }}"
                     class="navbar-title">

            </a>

            <button class="navbar-toggler"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('public.inicio') }}">
                            INICIO
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('agenda.view_agenda') }}">
                            AGENDA
                        </a>
                    </li>

                    <!-- 🔥 EVITAMOS ERROR SI NO EXISTE -->
                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            ACERCA DE
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            CONTACTO
                        </a>
                    </li>

                </ul>

                {% if current_user.is_authenticated %}

                    <span class="text-white ms-3">
                        {{ current_user.id }}
                    </span>

                    <a href="{{ url_for('auth.logout') }}"
                       class="btn btn-outline-light ms-2">
                        Cerrar sesión
                    </a>

                {% else %}

                    <a href="{{ url_for('auth.login') }}"
                       class="btn btn-outline-light ms-2">
                        Iniciar sesión
                    </a>

                {% endif %}

            </div>

        </div>

    </nav>

    <main class="contenido-principal">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
