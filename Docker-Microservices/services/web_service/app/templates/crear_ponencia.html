{% extends "base.html" %}

{% block title %}Crear ponencia{% endblock %}

{% block content %}
<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Crear nueva ponencia</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nombre del ponente</label>
                                <input type="text" class="form-control" name="nombre" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Pais</label>
                                <input type="text" class="form-control" name="pais" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Titulo de la ponencia</label>
                            <input type="text" class="form-control" name="titulo" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Fecha</label>
                                <input type="date" class="form-control" name="fecha" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Hora</label>
                                <input type="time" class="form-control" name="hora" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Modalidad</label>
                                <select class="form-select" name="modalidad">
                                    <option>Presencial</option>
                                    <option>Virtual</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Tipo</label>
                                <input type="text" class="form-control" name="tipo" value="Ponencia">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Sede</label>
                                <input type="text" class="form-control" name="sede" value="Claustro">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Salon</label>
                                <input type="text" class="form-control" name="salon" value="Auditorio Nuevo">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Bandera (ruta estatica)</label>
                            <input type="text" class="form-control" name="bandera" value="banderas/mexico.png">
                        </div>
                        <div class="d-flex justify-content-end gap-2">
                            <a href="{{ url_for('agenda.view_agenda') }}" class="btn btn-outline-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary">Guardar ponencia</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
