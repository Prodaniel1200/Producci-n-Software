version: "3.9"

services:
  gateway:
    build: ./gateway
    ports:
      - "8000:80"
    depends_on:
      - web_service

  web_service:
    build: ./services/web_service
    environment:
      SECRET_KEY: ${SECRET_KEY:-super-secret-dev-key}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth_service:5000}
      AGENDA_SERVICE_URL: ${AGENDA_SERVICE_URL:-http://agenda_service:5000}
      CONTACT_SERVICE_URL: ${CONTACT_SERVICE_URL:-http://contact_service:5000}
      INTEGRATIONS_SERVICE_URL: ${INTEGRATIONS_SERVICE_URL:-http://integrations_service:5000}
    volumes:
      - ./data:/app/data
    depends_on:
      - auth_service
      - agenda_service
      - contact_service
      - integrations_service

  auth_service:
    build: ./services/auth_service
    environment:
      USERS_CSV_PATH: /app/data/users.csv
    volumes:
      - ./data:/app/data

  agenda_service:
    build: ./services/agenda_service

  contact_service:
    build: ./services/contact_service
    environment:
      CONTACT_CSV_PATH: /app/data/contact_messages.csv
    volumes:
      - ./data:/app/data

  integrations_service:
    build: ./services/integrations_service
    environment:
      MS_CLIENT_ID: ${MS_CLIENT_ID:-}
      MS_CLIENT_SECRET: ${MS_CLIENT_SECRET:-}
      MS_TENANT_ID: ${MS_TENANT_ID:-}
